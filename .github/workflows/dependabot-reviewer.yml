name: Dependabot Reviewer Router

on: # yamllint disable-line rule:truthy
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  route-reviewer:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Route Reviewers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          ADMIN_TEAM: "GoogleCloudPlatform/cloud-solutions-the-repo-admin"
        run: |
          echo "Processing Dependabot PR: $PR_URL"

          # Get all currently requested reviewers (type and login)
          CURRENT_REVIEWERS=$(gh pr view "$PR_URL" --json reviewRequests --jq '.reviewRequests[] | "\(.type):\(.login)"')

          echo "Found reviewers: $CURRENT_REVIEWERS"

          # Loop and remove auto-assigned reviewers
          for r in $CURRENT_REVIEWERS; do
            TYPE=$(echo "$r" | cut -d':' -f1)
            LOGIN=$(echo "$r" | cut -d':' -f2)

            if [ "$TYPE" = "Team" ]; then
              FULL_NAME="GoogleCloudPlatform/$LOGIN"
            else
              FULL_NAME="$LOGIN"
            fi

            # Skip admin team if already present
            if [ "$FULL_NAME" != "$ADMIN_TEAM" ] && [ "$LOGIN" != "cloud-solutions-the-repo-admin" ]; then
              echo "Removing reviewer: $FULL_NAME"
              gh pr edit "$PR_URL" --remove-reviewer "$FULL_NAME"
            fi
          done

          # Add the admin team as the sole reviewer
          echo "Adding admin team as reviewer: $ADMIN_TEAM"
          gh pr edit "$PR_URL" --add-reviewer "$ADMIN_TEAM"
