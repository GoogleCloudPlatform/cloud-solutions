apiVersion: v1
kind: ConfigMap
metadata:
  name: proxy-demo-app-config
  namespace: app
data:
  nginx.conf: |
    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        location /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
  start.sh: |
    #!/bin/sh
    set -e

    CLOUD_PROVIDER="${CLOUD_PROVIDER:-UNKNOWN}"
    CLUSTER_NAME="${CLUSTER_NAME:-unknown-cluster}"
    REGION="${REGION:-unknown-region}"
    PLATFORM="${PLATFORM:-unknown}"

    if [ "${CLOUD_PROVIDER}" = "GCP" ]; then
      BG_COLOR="#1A73E8"
      PLATFORM="Google Kubernetes Engine"
    elif [ "${CLOUD_PROVIDER}" = "AWS" ]; then
      BG_COLOR="#FF9900"
      PLATFORM="Amazon EKS"
    else
      BG_COLOR="#5f6368"
    fi

    sed \
      -e "s|CLOUD_PROVIDER_PLACEHOLDER|${CLOUD_PROVIDER}|g" \
      -e "s|CLUSTER_NAME_PLACEHOLDER|${CLUSTER_NAME}|g" \
      -e "s|REGION_PLACEHOLDER|${REGION}|g" \
      -e "s|PLATFORM_PLACEHOLDER|${PLATFORM}|g" \
      -e "s|BG_COLOR_PLACEHOLDER|${BG_COLOR}|g" \
      /usr/share/nginx/html/index.template.html \
      >/usr/share/nginx/html/index.html

    exec nginx -g 'daemon off;'
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>proxy-demo — Migration Demo</title>
      <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet" />
      <style>
        body {
          margin: 0;
          min-height: 100vh;
          background: BG_COLOR_PLACEHOLDER;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          font-family: 'Google Sans', sans-serif;
          color: #ffffff;
          gap: 12px;
        }
        .label {
          font-size: 13px;
          font-weight: 500;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          opacity: 0.7;
        }
        .provider {
          font-size: clamp(72px, 16vw, 140px);
          font-weight: 500;
          letter-spacing: -0.02em;
          line-height: 1;
        }
        .platform {
          font-size: 18px;
          opacity: 0.8;
        }
        .meta {
          margin-top: 16px;
          font-family: 'Roboto Mono', monospace;
          font-size: 13px;
          opacity: 0.6;
          text-align: center;
          line-height: 2;
        }
      </style>
    </head>
    <body>
      <div class="label">Running on</div>
      <div class="provider">CLOUD_PROVIDER_PLACEHOLDER</div>
      <div class="platform">PLATFORM_PLACEHOLDER</div>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: proxy-demo-env
  namespace: app
data:
  CLOUD_PROVIDER: "CLOUD_PROVIDER_PLACEHOLDER"
  PLATFORM: "PLATFORM_PLACEHOLDER"
  CLUSTER_NAME: "CLUSTER_NAME_PLACEHOLDER"
  REGION: "REGION_PLACEHOLDER"
