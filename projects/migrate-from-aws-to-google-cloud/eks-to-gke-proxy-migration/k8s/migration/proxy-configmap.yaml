apiVersion: v1
kind: ConfigMap
metadata:
  name: eks-proxy-config
  namespace: app
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 80;
        location / {
          proxy_pass http://EKS_ALB_HOSTNAME_PLACEHOLDER;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
      }
    }
